<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — RatedWorktops</title>
  <meta name="description" content="Create your free RatedWorktops account and start visualising stone worktops in your kitchen today."/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>

  <div class="auth-page">
    <div class="auth-card fade-up" style="max-width:480px">

      <div class="auth-logo">
        <a href="index.html">
          <div class="logo-icon-lg">🪨</div>
        </a>
        <h1 class="auth-title">Start for free</h1>
        <p class="auth-subtitle">Get 10 free visualisation credits on sign up</p>
      </div>

      <!-- Credits pill -->
      <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin:-8px 0 20px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          10 free credits
        </div>
        <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          No card required
        </div>
        <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-muted)">
          <svg width="14" height="14" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Cancel anytime
        </div>
      </div>

      <div class="auth-divider" style="margin-top:0"></div>

      <!-- Google -->
      <button class="google-btn" id="google-btn" onclick="googleSignUp()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign up with Google
      </button>

      <div class="or-divider">or create account with email</div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="name" placeholder="Your full name" autocomplete="name" required/>
          </div>
          <div class="error-text" id="name-error"></div>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <div class="error-text" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap" style="position:relative">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password" required style="padding-right:44px" oninput="checkStrength(this.value)"/>
            <button type="button" class="show-pass-btn" id="toggle-pass">
              <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pass-strength" id="strength-bars">
            <div class="strength-bar" id="s1"></div>
            <div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div>
            <div class="strength-bar" id="s4"></div>
          </div>
          <div class="error-text" id="password-error"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" required/>
          </div>
          <div class="error-text" id="confirm-error"></div>
        </div>

        <div style="margin-bottom:18px">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;text-transform:none;font-size:12px;color:var(--text-muted);font-weight:400;letter-spacing:0">
            <input type="checkbox" id="terms" style="width:15px;height:15px;flex-shrink:0;margin-top:1px;accent-color:var(--gold)"/>
            I agree to the <a href="#" style="color:var(--gold);margin:0 3px">Terms of Service</a> and <a href="#" style="color:var(--gold);margin:0 3px">Privacy Policy</a>
          </label>
          <div class="error-text" id="terms-error"></div>
        </div>

        <div id="form-error" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn" style="justify-content:center">
          Create Free Account
        </button>
      </form>

      <div class="auth-footer-link">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

      <div style="text-align:center;margin-top:12px">
        <a href="index.html" style="font-size:12px;color:var(--text-muted)">← Back to homepage</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (await getCurrentUser()) {
        window.location.href = 'dashboard.html' + window.location.search;
        return;
      }

      // Preserve query params for sign-in link
      if (window.location.search) {
        const loginLink = document.querySelector('.auth-footer-link a');
        if (loginLink) {
          loginLink.href = 'login.html' + window.location.search;
        }
      }
    });

    document.getElementById('toggle-pass').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>`;
      } else {
        inp.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    function checkStrength(val) {
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('s' + i);
        bar.className = 'strength-bar';
        if (i <= score) {
          bar.classList.add(score <= 1 ? 'filled-weak' : score <= 2 ? 'filled-ok' : 'filled-strong');
        }
      }
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const terms = document.getElementById('terms').checked;
      const btn = document.getElementById('submit-btn');

      // Clear errors
      ['name-error','email-error','password-error','confirm-error','terms-error'].forEach(id => {
        document.getElementById(id).textContent = '';
      });
      document.getElementById('form-error').style.display = 'none';

      let valid = true;
      if (!name) { document.getElementById('name-error').textContent = 'Please enter your name.'; valid = false; }
      if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('email-error').textContent = 'Please enter a valid email.'; valid = false; }
      if (password.length < 8) { document.getElementById('password-error').textContent = 'Password must be at least 8 characters.'; valid = false; }
      if (password !== confirm) { document.getElementById('confirm-error').textContent = 'Passwords do not match.'; valid = false; }
      if (!terms) { document.getElementById('terms-error').textContent = 'You must agree to the terms.'; valid = false; }
      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      await new Promise(r => setTimeout(r, 800));

      const result = await registerUser({ name, email, password });
      if (result.ok) {
        // We no longer manually set current_user to localStorage,
        // Supabase manages session automatically via secure cookies/localStorage.
        showToast('Account created! Welcome to RatedWorktops 🎉');
        setTimeout(() => {
          window.location.href = 'dashboard.html' + window.location.search;
        }, 1000);
      } else {
        document.getElementById('form-error').textContent = result.error;
        document.getElementById('form-error').style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Free Account';
      }
    });

    async function googleSignUp() {
      if (!supabaseClient) {
        showToast('Database disconnected', 'error');
        return;
      }
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2.5px;margin:0;border-top-color:#fff"></div> Connecting to Google...`;
      
      const redirectToUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/dashboard.html' + window.location.search);
      
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: redirectToUrl
        }
      });
      
      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Sign up with Google`;
      }
    }
  </script>
</body>
</html>
