<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — RatedWorktops</title>
  <meta name="description" content="RatedWorktops administrator portal login"/>
  <link rel="stylesheet" href="css/admin.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); overflow: hidden; }

    .login-bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(201,169,110,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,169,110,0.04) 0%, transparent 50%);
    }

    .login-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 0 20px;
    }

    .login-card {
      background: rgba(17,17,24,0.85);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .logo-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(201,169,110,0.3);
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      color: #000;
    }

    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .login-logo p {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
    }

    .login-divider {
      height: 1px;
      background: var(--border);
      margin: 0 -40px 28px;
    }

    .form-group { margin-bottom: 20px; }

    .input-group {
      position: relative;
    }

    .input-group svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      width: 16px; height: 16px;
      color: var(--text-muted);
    }

    .input-group input {
      padding-left: 42px;
      height: 48px;
      font-size: 14px;
    }

    .show-pass-btn {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      transition: color var(--transition);
      z-index: 10;
    }
    .show-pass-btn:hover { color: var(--text-secondary); }

    .login-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(201,169,110,0.25);
      margin-top: 8px;
    }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 6px 24px rgba(201,169,110,0.4);
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(0); }

    .login-btn.loading { opacity: 0.7; pointer-events: none; }

    .hint-box {
      background: var(--gold-glow);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-top: 20px;
    }

    .hint-box p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
    .hint-box code { color: var(--gold); font-family: 'Courier New', monospace; font-size: 11px; }

    .error-msg {
      background: var(--danger-bg);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--danger);
      margin-top: 12px;
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .back-link a { color: var(--gold); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.15;
      animation: float linear infinite;
      pointer-events: none;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-grid"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">R</div>
        <h1>RatedWorktops</h1>
        <p>Admin Portal</p>
      </div>

      <div class="login-divider"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-group">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,12 2,6"/>
            </svg>
            <input type="email" id="email" placeholder="ratedworktopsapp@gmail.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
            <button type="button" class="show-pass-btn" id="toggle-pass" aria-label="Show password">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <button type="submit" class="login-btn" id="login-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Sign in to Admin Portal
        </button>
      </form>



      <div class="back-link">
        <a href="../index.html">← Back to RatedWorktops</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/admin.js"></script>
  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        // Simple check for admin email
        if (data.session.user.email === 'ratedworktopsapp@gmail.com') {
          window.location.href = 'dashboard.html';
        }
      }
    });

    // Floating particles
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*15+10}s;
        animation-delay:-${Math.random()*15}s;
      `;
      document.body.appendChild(p);
    }

    // Toggle password visibility
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const input = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const btn = document.getElementById('login-btn');

      btn.classList.add('loading');
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

       // Check if it's the admin email
      if (email !== 'ratedworktopsapp@gmail.com') {
        errEl.textContent = 'Unauthorized email address.';
        errEl.style.display = 'block';
        btn.classList.remove('loading');
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Sign in to Admin Portal`;
        return;
      }

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        btn.classList.remove('loading');
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> Sign in to Admin Portal`;
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
