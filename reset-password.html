<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — RatedWorktops</title>
  <meta name="description" content="Set a new password for your RatedWorktops account."/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>

  <div class="auth-page">
    <div class="auth-card fade-up" id="request-card" style="max-width:480px">
      <div class="auth-logo">
        <a href="index.html"><div class="logo-icon-lg">🪨</div></a>
        <h1 class="auth-title">Set new password</h1>
        <p class="auth-subtitle">Please enter your new password below</p>
      </div>
      <div class="auth-divider"></div>
      
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-icon-wrap" style="position:relative">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password" required style="padding-right:44px" oninput="checkStrength(this.value)"/>
            <button type="button" class="show-pass-btn" id="toggle-pass">
              <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pass-strength" id="strength-bars">
            <div class="strength-bar" id="s1"></div>
            <div class="strength-bar" id="s2"></div>
            <div class="strength-bar" id="s3"></div>
            <div class="strength-bar" id="s4"></div>
          </div>
          <div class="error-text" id="password-error"></div>
        </div>

        <div class="form-group">
          <label for="confirm">Confirm new password</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password" required/>
          </div>
          <div class="error-text" id="confirm-error"></div>
        </div>

        <div id="form-error" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn" style="justify-content:center">
          Update Password
        </button>
      </form>
    </div>

    <!-- Success state -->
    <div class="auth-card fade-up" id="success-card" style="display:none;text-align:center">
      <div style="width:64px;height:64px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="28" height="28" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="auth-title">Password updated</h2>
      <p style="font-size:14px;color:var(--text-muted);line-height:1.7;margin-top:8px">
        Your password has been reset successfully.<br/>
        You can now sign in with your new credentials.
      </p>
      <button onclick="handleRedirectToLogin()" class="btn btn-primary w-full btn-lg" style="justify-content:center;margin-top:20px">Sign In</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    // Visibility toggle
    document.getElementById('toggle-pass').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>`;
      } else {
        inp.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    // Password strength check
    function checkStrength(val) {
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      for (let i = 1; i <= 4; i++) {
        const bar = document.getElementById('s' + i);
        bar.className = 'strength-bar';
        if (i <= score) {
          bar.classList.add(score <= 1 ? 'filled-weak' : score <= 2 ? 'filled-ok' : 'filled-strong');
        }
      }
    }

    // Submit handler
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('form-error');

      // Clear errors
      document.getElementById('password-error').textContent = '';
      document.getElementById('confirm-error').textContent = '';
      errEl.style.display = 'none';

      let valid = true;
      if (password.length < 8) {
        document.getElementById('password-error').textContent = 'Password must be at least 8 characters.';
        valid = false;
      }
      if (password !== confirm) {
        document.getElementById('confirm-error').textContent = 'Passwords do not match.';
        valid = false;
      }
      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'Updating password…';

      if (supabaseClient) {
        const { error } = await supabaseClient.auth.updateUser({ password });
        if (error) {
          errEl.textContent = error.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Update Password';
          return;
        }
      } else {
        await new Promise(r => setTimeout(r, 1000));
      }

      document.getElementById('request-card').style.display = 'none';
      document.getElementById('success-card').style.display = 'block';
    });

    async function handleRedirectToLogin() {
      // Sign out to clear temporary recovery session
      if (supabaseClient) {
        await supabaseClient.auth.signOut();
      }
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
