<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — RatedWorktops</title>
  <meta name="description" content="Reset your RatedWorktops password."/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>

  <div class="auth-page">
    <div class="auth-card fade-up" id="request-card">
      <div class="auth-logo">
        <a href="index.html"><div class="logo-icon-lg">R</div></a>
        <h1 class="auth-title">Forgot password?</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>
      </div>
      <div class="auth-divider"></div>
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <div class="error-text" id="email-error"></div>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn" style="justify-content:center">
          Send Reset Link
        </button>
      </form>
      <div class="auth-footer-link" style="margin-top:16px">
        <a href="login.html">← Back to sign in</a>
      </div>
    </div>

    <!-- Success state -->
    <div class="auth-card fade-up" id="success-card" style="display:none;text-align:center">
      <div style="width:64px;height:64px;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <svg width="28" height="28" fill="none" stroke="#4ade80" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="auth-title">Check your email</h2>
      <p style="font-size:14px;color:var(--text-muted);line-height:1.7;margin-top:8px">
        We've sent a password reset link to<br/>
        <strong style="color:var(--gold)" id="sent-email"></strong>
      </p>
      <div style="background:var(--gold-glow);border:1px solid var(--border-gold);border-radius:10px;padding:14px;margin-top:20px;font-size:12px;color:var(--text-secondary)">
        💡 Didn't receive it? Check your spam folder. The link expires in 30 minutes.
      </div>
      <a href="login.html" class="btn btn-ghost w-full btn-lg" style="justify-content:center;margin-top:20px">Back to Sign In</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const errEl = document.getElementById('email-error');
      const btn = document.getElementById('submit-btn');

      errEl.textContent = '';
      if (!email || !/\S+@\S+\.\S+/.test(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      if (supabaseClient) {
        const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html',
        });
        if (error) {
          errEl.textContent = error.message;
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
          return;
        }
      } else {
        await new Promise(r => setTimeout(r, 1000));
      }

      document.getElementById('sent-email').textContent = email;
      document.getElementById('request-card').style.display = 'none';
      document.getElementById('success-card').style.display = 'block';
    });
  </script>
</body>
</html>
