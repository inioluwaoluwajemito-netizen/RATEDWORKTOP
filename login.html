<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — RatedWorktops</title>
  <meta name="description" content="Sign in to your RatedWorktops account and start visualising your dream kitchen worktops."/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>
  <div class="auth-bg"></div>
  <div class="auth-grid"></div>

  <div class="auth-page">
    <div class="auth-card fade-up">

      <div class="auth-logo">
        <a href="index.html">
          <div class="logo-icon-lg">🪨</div>
        </a>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue visualising your kitchen</p>
      </div>

      <div class="auth-divider"></div>

      <!-- Google Sign-In -->
      <button class="google-btn" id="google-btn" onclick="googleSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <div class="or-divider">or sign in with email</div>

      <!-- Email Form -->
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-icon-wrap">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
          </div>
          <div class="error-text" id="email-error"></div>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <label for="password" style="margin-bottom:0">Password</label>
            <a href="forgot-password.html" style="font-size:12px;color:var(--gold);font-weight:500">Forgot password?</a>
          </div>
          <div class="input-icon-wrap" style="position:relative">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required style="padding-right:44px"/>
            <button type="button" class="show-pass-btn" id="toggle-pass">
              <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="error-text" id="password-error"></div>
        </div>

        <div id="form-error" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn" style="justify-content:center">
          Sign In
        </button>
      </form>

      <div class="auth-footer-link">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>

      <!-- Demo hint -->
      <div style="margin-top:20px;padding:12px 14px;background:var(--gold-glow);border:1px solid var(--border-gold);border-radius:10px">
        <p style="font-size:12px;color:var(--text-secondary);line-height:1.6">
          <strong style="color:var(--gold)">Demo account:</strong><br/>
          Email: <code style="color:var(--gold);font-family:monospace">demo@ratedworktops.com</code><br/>
          Password: <code style="color:var(--gold);font-family:monospace">Demo123</code>
        </p>
      </div>

      <div style="text-align:center;margin-top:16px">
        <a href="index.html" style="font-size:12px;color:var(--text-muted)">← Back to homepage</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', async () => {
      if (await getCurrentUser()) window.location.href = 'visualiser.html';
    });

    document.getElementById('toggle-pass').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/>`;
      } else {
        inp.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('form-error');
      const btn = document.getElementById('submit-btn');

      document.getElementById('email-error').textContent = '';
      document.getElementById('password-error').textContent = '';
      errEl.style.display = 'none';

      if (!email) { document.getElementById('email-error').textContent = 'Please enter your email.'; return; }
      if (!password) { document.getElementById('password-error').textContent = 'Please enter your password.'; return; }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      await new Promise(r => setTimeout(r, 700));

      const result = await loginUser({ email, password });
      if (result.ok) {
        window.location.href = 'visualiser.html';
      } else {
        errEl.textContent = result.error;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    async function googleSignIn() {
      if (!supabaseClient) {
        showToast('Database disconnected', 'error');
        return;
      }
      const btn = document.getElementById('google-btn');
      btn.disabled = true;
      btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2.5px;margin:0;border-top-color:#fff"></div> Connecting to Google...`;
      
      const redirectToUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/visualiser.html');
      
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: redirectToUrl
        }
      });
      
      if (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
      }
    }
  </script>
</body>
</html>
